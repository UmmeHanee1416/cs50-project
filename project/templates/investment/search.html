{% extends "layout.html" %}

{% block title %}
Search
{% endblock %}

{% block main %}
<form action="/symbol" method="post">
    <div class="mb-3">
        <input autocomplete="off" class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md text-sm shadow-sm placeholder-slate-500 text-slate-500
      focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500" name="symbol" placeholder="Symbol"
            type="text">
    </div>
    <button class="mb-3 mt-1 px-4 py-1 text-sm text-sky-600 font-semibold rounded-full border border-sky-200 hover:text-white
    hover:bg-sky-600 hover:border-transparent focus:outline-none focus:ring-2 focus:ring-sky-600 focus:ring-offset-2" type="submit">Search</button>
</form>
<table class="min-w-full text-sm text-left text-gray-700 border border-gray-200">
    <thead class="bg-gray-100 text-gray-800 uppercase">
        <tr>
            <th class="px-6 py-3 border-b">Name</th>
            <th class="px-6 py-3 border-b">Symbol</th>
            <th class="px-6 py-3 border-b">Price</th>
        </tr>
    </thead>
    <tbody class="bg-white divide-y divide-gray-100">
        <tr class="hover:bg-gray-50">
            <td class="px-6 py-4">{{ row['name'] }}</td>
            <td class="px-6 py-4">{{ row['symbol'] }}</td>
            <td class="px-6 py-4">${{ row['price'] }}</td>
        </tr>
    </tbody>
</table>
{% endblock %}

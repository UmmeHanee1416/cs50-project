{% extends "layout.html" %}

{% block title %}
Investment
{% endblock %}

{% block main %}
<form action="/saveOrUpdateInvestment" method="post">
  <input type="hidden" name="id">
  <div class="mb-3 grid grid-cols-2 gap-4">
    <input autocomplete="off" class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md text-sm shadow-sm placeholder-slate-500 text-slate-500
      focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500" name="username" placeholder="Username"
      type="text" value="{{ user[0]['username'] }}" readonly>
      <a href="/symbol"
         class="mt-1 block w-full px-3 py-2 bg-sky-700 border border-slate-300 rounded-md text-sm shadow-sm placeholder-white text-white
                focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 font-semibold">Stock Market Analysis
      </a>
  </div>
  <div class="mb-3">
    <input autocomplete="off" class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md text-sm shadow-sm placeholder-slate-500 text-slate-500
      focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500" name="symbol" placeholder="Symbol *"
      type="text" required>
  </div>
  <div class="mb-3">
    <input autocomplete="off" class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md text-sm shadow-sm placeholder-slate-500 text-slate-500
      focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500" name="shares" placeholder="Shares *"
      type="number" required>
  </div>
  <div class="mb-3">
    <input autocomplete="off" class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md text-sm shadow-sm placeholder-slate-500 text-slate-500
      focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500" name="date" placeholder="Purchase date *"
      type="date" required>
  </div>
  <button class="mb-3 mt-1 px-4 py-1 text-sm text-sky-600 font-semibold rounded-full border border-sky-200 hover:text-white
    hover:bg-sky-600 hover:border-transparent focus:outline-none focus:ring-2 focus:ring-sky-600 focus:ring-offset-2"
    type="submit">+ Add</button>
</form>
{% endblock %}

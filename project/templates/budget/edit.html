{% extends "layout.html" %}

{% block title %}
Budget
{% endblock %}

{% block main %}
<form action="/saveOrUpdateBudget" method="post">
  <input type="hidden" name="id" value="{{ budget[0]['id'] }}">
  <div class="mb-3">
    <input autocomplete="off" class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md text-sm shadow-sm placeholder-slate-500 text-slate-500
      focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500" name="username" placeholder="Username"
      type="text" value="{{ user[0]['username'] }}" required readonly>
  </div>
  <div class="mb-3">
    <input autocomplete="off" class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md text-sm shadow-sm placeholder-slate-500 text-slate-500
      focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500" name="amount" placeholder="Amount *"
      type="number" value="{{ budget[0]['amount'] }}" required>
  </div>
  <div class="mb-3">
    <select class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md text-sm shadow-sm placeholder-slate-400 text-slate-500
      focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500" name="category" id="category">
      <option value="" selected disabled>Please Select Category *</option>
      {% for category in categories %}
      <option value="{{ category }}" {% if category==budget[0]['category'] %} selected {% endif %}>{{ category }}
      </option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <select class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md text-sm shadow-sm placeholder-slate-400 text-slate-500
      focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500" name="period_type" id="period_type"
      onchange="changePeriod(this)">
      <option value="" selected disabled>Please Select Type *</option>
      {% for type in types %}
      <option value="{{ type }}" {% if type==budget[0]['period_type'] %} selected {% endif %}>{{ type }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <input autocomplete="off" class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md text-sm shadow-sm placeholder-slate-500 text-slate-500
      focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500" name="fromPeriod" id="fromPeriod" {%
      if 'Yearly'==budget[0]['period_type'] %} hidden {% endif%} {% if 'Weekly'==budget[0]['period_type'] %} type="week"
      {% elif 'Monthly'==budget[0]['period_type'] %} type="month" {% endif %} value="{{ budget[0]['from_period'] }}"
      required>
    <select id="fromYear" name="fromYear" class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md text-sm shadow-sm placeholder-slate-400 text-slate-500
      focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500" {% if 'Yearly'
      !=budget[0]['period_type'] %} hidden {% endif%}>
      <option value="">Select Year From</option>
      <script>
        const fromYear = document.getElementById('fromYear');
        const currentYear = new Date().getFullYear();
        const startYear = 1990;
        const endYear = currentYear + 20;
        for (let year = startYear; year <= endYear; year++) {
          const option = document.createElement('option');
          option.value = year;
          option.textContent = year;
          if ( year === {{ budget[0]['from_period'] }} ) {
          option.selected = true;
        }
        fromYear.appendChild(option);
        }
      </script>
    </select>
  </div>
  <div class="mb-3">
    <input autocomplete="off" class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md text-sm shadow-sm placeholder-slate-500 text-slate-500
      focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500" name="toPeriod" id="toPeriod"
      {% if 'Yearly'==budget[0]['period_type'] %} hidden {% endif%} {% if 'Weekly'==budget[0]['period_type'] %} type="week"
      {% elif 'Monthly'==budget[0]['period_type'] %} type="month" {% endif %} value="{{ budget[0]['to_period'] }}"
      required>
    <select id="toYear" name="toYear" class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md text-sm shadow-sm placeholder-slate-400 text-slate-500
      focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500" {% if 'Yearly'
      !=budget[0]['period_type'] %} hidden {% endif%}>
      <option value="">Select Year To</option>
      <script>
        const toYear = document.getElementById('toYear');
        for (let year = startYear; year <= endYear; year++) {
          const option = document.createElement('option');
          option.value = year;
          option.textContent = year;
          if (year === {{ budget[0]['to_period'] }}) {
          option.selected = true;
        }
        toYear.appendChild(option);
        }
      </script>
    </select>
  </div>
  <button class="mb-3 mt-1 px-4 py-1 text-sm text-sky-600 font-semibold rounded-full border border-sky-200 hover:text-white
    hover:bg-sky-600 hover:border-transparent focus:outline-none focus:ring-2 focus:ring-sky-600 focus:ring-offset-2"
    type="submit">Update</button>
</form>
{% endblock %}

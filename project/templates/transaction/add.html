{% extends "layout.html" %}

{% block title %}
Transaction
{% endblock %}

{% block main %}
<div class="flex grid-col-2 gap-2 justify-end">
  <a href="/uploadCsv" class="mt-1 mb-3 block w-1/4 px-3 py-2 bg-sky-700 border border-slate-300
                rounded-md text-sm shadow-sm placeholder-white text-white place-self-end
                focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 font-semibold">
    Upload CSV / Excell
  </a>
</div>
<form action="/saveOrUpdateTransaction" method="post">
  <input type="hidden" name="id">
  <div class="mb-3">
    <input autocomplete="off" class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md text-sm shadow-sm placeholder-slate-500 text-slate-500
      focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500" name="username" placeholder="Username"
      type="text" value="{{ user[0]['username'] }}" required readonly>
  </div>
  <div class="mb-3">
    <select class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md text-sm shadow-sm text-slate-500
      focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500" name="type"
      onchange="getCategory(this)">
      <option value="" selected disabled>Please Select Type *</option>
      {% for type in types %}
      <option value="{{ type }}">{{ type }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <input autocomplete="off" class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md text-sm shadow-sm placeholder-slate-500 text-slate-500
      focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500" name="amount" placeholder="Amount *"
      type="number" required>
  </div>
  <div class="mb-3">
    <select class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md text-sm shadow-sm placeholder-slate-400 text-slate-500
      focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500" name="category" id="category">
      <option value="" selected disabled>Please Select Category *</option>
    </select>
  </div>
  <div class="mb-3">
    <select class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md text-sm shadow-sm placeholder-slate-400 text-slate-500
      focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500" name="date_type" id="date_type"
      onchange="changePeriodT(this)" required>
      <option value="" selected disabled>Please Select Type *</option>
      {% for type in period_type %}
      <option value="{{ type }}">{{ type }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <input autocomplete="off" class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md text-sm shadow-sm placeholder-slate-500 text-slate-500
      focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500" name="date" id="date" required>
    <select id="dateY" name="dateY" class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md text-sm shadow-sm placeholder-slate-400 text-slate-500
      focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500" hidden>
      <option value="">Select Year</option>
    </select>
  </div>
  <div class="mb-3">
    <textarea class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md text-sm shadow-sm placeholder-slate-500 text-slate-500
      focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500" name="description"
      placeholder="Description (Optional)"></textarea>
  </div>
  <button class="mb-3 mt-1 px-4 py-1 text-sm text-sky-600 font-semibold rounded-full border border-sky-200 hover:text-white
    hover:bg-sky-600 hover:border-transparent focus:outline-none focus:ring-2 focus:ring-sky-600 focus:ring-offset-2"
    type="submit">+ Add</button>
</form>
{% endblock %}

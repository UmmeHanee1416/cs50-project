{% extends "layout.html" %}

{% block title %}
Upload Transaction CSV
{% endblock %}

{% block main %}
<button command="show-modal" commandfor="dialog"
  class="rounded-md bg-gray-950/5 px-2.5 py-1.5 text-sm font-semibold text-gray-900 hover:bg-gray-950/10" disabled
  id="openModalBtn">Open dialog</button>
<button command="show-modal" commandfor="dialog"
  class="rounded-md bg-gray-950/5 px-2.5 py-1.5 text-sm font-semibold text-gray-900 hover:bg-gray-950/10" disabled
  id="clearBtn">Clear</button>
<el-dialog>
  <dialog id="dialog" aria-labelledby="dialog-title"
    class="fixed inset-0 size-auto max-h-none max-w-none overflow-y-auto bg-transparent backdrop:bg-transparent">
    <el-dialog-backdrop class="fixed inset-0 bg-gray-500/75 transition-opacity data-closed:opacity-0 data-enter:duration-300
      data-enter:ease-out data-leave:duration-200 data-leave:ease-in"></el-dialog-backdrop>
    <div tabindex="0"
      class="flex min-h-full items-end justify-center p-4 text-center focus:outline-none sm:items-center sm:p-0">
      <el-dialog-panel class="relative transform overflow-hidden rounded-lg bg-white text-left shadow-xl transition-all
        data-closed:translate-y-4 data-closed:opacity-0 data-enter:duration-300 data-enter:ease-out
        data-leave:duration-200 data-leave:ease-in sm:my-8 sm:w-full sm:max-w-lg data-closed:sm:translate-y-0
        data-closed:sm:scale-95">
        <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
          <div class="sm:flex sm:items-start">
            <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left">
              <h3 id="dialog-title" class="text-base font-semibold text-gray-900"></h3>
              <div class="mt-2">
                <table id="csvTable" class="table-auto border-collapse border border-sky-300 w-full text-sm">
                  <thead class="bg-sky-200"></thead>
                  <tbody></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
        <div class="bg-gray-50 px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6">
          <button type="button" command="close" commandfor="dialog"
            class="inline-flex w-full justify-center rounded-md bg-red-600 px-3 py-2 text-sm font-semibold text-white shadow-xs hover:bg-red-500 sm:ml-3 sm:w-auto">Deactivate</button>
          <button type="button" command="close" commandfor="dialog"
            class="mt-3 inline-flex w-full justify-center rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-xs inset-ring inset-ring-gray-300 hover:bg-gray-50 sm:mt-0 sm:w-auto">Cancel</button>
        </div>
      </el-dialog-panel>
    </div>
  </dialog>
</el-dialog>
<form action="/uploadCsv" method="post">
  <div class="mb-3">
    <input autocomplete="off" class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md
                text-sm shadow-sm placeholder-slate-500 text-slate-500 focus:outline-none focus:border-sky-500
                focus:ring-1 focus:ring-sky-500" name="csvFile" id="csvFile" type="file" accept=".csv, .xlsx" required>

  </div>
  <button class="mb-3 mt-1 px-4 py-1 text-sm text-sky-600 font-semibold rounded-full border border-sky-200
    hover:text-white hover:bg-sky-600 hover:border-transparent focus:outline-none focus:ring-2 focus:ring-sky-600
    focus:ring-offset-2" type="submit">Upload</button>
</form>




<!-- Upload Button -->
<!-- <label class="bg-blue-500 text-white px-4 py-2 rounded cursor-pointer">
  Upload CSV
  <input type="file" id="csvFile" accept=".csv" class="hidden">
</label> -->
<script>
  const fileInput = document.getElementById('csvFile');
  const modal = document.getElementById('csvModal');
  const closeModal = document.getElementById('closeModal');
  const tableHead = document.querySelector('#csvTable thead');
  const tableBody = document.querySelector('#csvTable tbody');
  const openModalBtn = document.getElementById('openModalBtn');
  const clearBtn = document.getElementById('clearBtn');
  const dialogTitle = document.getElementById('dialog-title');

  fileInput.addEventListener('change', function(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
      const text = e.target.result;
      openModalBtn.disabled = false;
      clearBtn.disabled = false;
      dialogTitle.innerText = file.name
      displayCSV(text);
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    };
    reader.readAsText(file);
  });

  clearBtn.addEventListener('click', function(){
    tableHead.innerHTML =''
    tableBody.innerHTML  =''
    openModalBtn.disabled = true;
      clearBtn.disabled = true;
  })

  function displayCSV(csvText) {
    const rows = csvText.trim().split('\n').map(row => row.split(','));
    tableHead.innerHTML = '';
    tableBody.innerHTML = '';

    // Header
    const headerRow = document.createElement('tr');
    rows[0].forEach(cell => {
      const th = document.createElement('th');
      th.textContent = cell;
      th.className = 'border border-gray-300 px-2 py-1';
      headerRow.appendChild(th);
    });
    tableHead.appendChild(headerRow);

    // Body
    rows.slice(1).forEach(row => {
      const tr = document.createElement('tr');
      row.forEach(cell => {
        const td = document.createElement('td');
        td.textContent = cell;
        td.className = 'border border-gray-300 px-2 py-1';
        tr.appendChild(td);
      });
      tableBody.appendChild(tr);
    });
  }

  closeModal.addEventListener('click', () => {
    modal.classList.add('hidden');
    modal.classList.remove('flex');
  });

  modal.addEventListener('click', (e) => {
    if (e.target === modal) {
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }
  });
</script>
{% endblock %}

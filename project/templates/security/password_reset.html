{% extends "layout.html" %}

{% block title %}
Reset Password
{% endblock %}

{% block main %}
<form action="/forgotPass" method="post">
    <div class="mb-3">
        <input autocomplete="off" autofocus class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md text-sm shadow-sm placeholder-slate-400
      focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500" name="username" placeholder="Username"
            type="text">
    </div>
    <div class="mb-3">
        <input class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md text-sm shadow-sm placeholder-slate-400
      focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500"
        name="password" placeholder="Password" type="password">
    </div>
    <div class="mb-3">
        <input class="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md text-sm shadow-sm placeholder-slate-400
      focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500"
        name="confirmPassword" placeholder="Confirm Password" type="password">
    </div>
    <button class="mt-1 px-4 py-1 text-sm text-sky-600 font-semibold rounded-full border border-sky-200 hover:text-white
    hover:bg-sky-600 hover:border-transparent focus:outline-none focus:ring-2 focus:ring-sky-600 focus:ring-offset-2" type="submit">Reset Password</button>
</form>
{% endblock %}
